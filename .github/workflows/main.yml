name: IPTV Stream Checker

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run IPTV checker
        env:
          PLAYLIST_URLS: ${{ secrets.PLAYLIST_URLS }}
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
          CHECK_TIMEOUT: "10"
          MAX_WORKERS: "15"
        run: python check_streams.py

      - name: Commit results.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet || git commit -m "chore: update stream results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
